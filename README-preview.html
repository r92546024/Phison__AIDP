<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>README 預覽 · Phison AI Data Platform</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root{color-scheme:dark;}
  body{margin:0;background:#010409;font-family:-apple-system,"Segoe UI","PingFang TC","Microsoft JhengHei",Helvetica,Arial,sans-serif;}
  .topbar{height:54px;background:#161b22;border-bottom:1px solid #30363d;display:flex;align-items:center;padding:0 20px;gap:10px;color:#e6edf3;font-size:14px;}
  .topbar .dot{width:10px;height:10px;border-radius:50%;background:#3fb950;}
  .topbar b{font-weight:600;}
  .topbar .muted{color:#8b949e;}
  .wrap{max-width:1012px;margin:24px auto;background:#0d1117;border:1px solid #30363d;border-radius:6px;overflow:hidden;}
  .readme-head{display:flex;align-items:center;gap:8px;padding:14px 16px;border-bottom:1px solid #30363d;color:#e6edf3;font-size:14px;}
  .readme-head svg{fill:#8b949e;}
  .md{padding:32px 40px 48px;color:#e6edf3;font-size:16px;line-height:1.6;}
  .md h2{font-size:1.5em;font-weight:600;padding-bottom:.3em;border-bottom:1px solid #21262d;margin-top:34px;}
  .md h3{font-size:1.15em;font-weight:600;margin-top:18px;}
  .md hr{height:1px;background:#21262d;border:0;margin:28px 0;}
  .md a{color:#2f81f7;text-decoration:none;}
  .md a:hover{text-decoration:underline;}
  .md img{max-width:100%;border-radius:8px;}
  .md table{border-collapse:collapse;width:100%;margin:16px 0;display:block;overflow:auto;}
  .md th,.md td{border:1px solid #30363d;padding:8px 13px;vertical-align:top;}
  .md th{background:#161b22;font-weight:600;text-align:left;}
  .md tr:nth-child(2n){background:#161b22;}
  .md blockquote{margin:0 0 16px;padding:0 1em;color:#8b949e;border-left:.25em solid #30363d;}
  .md code{background:#6e76811f;padding:.2em .4em;border-radius:6px;font-size:85%;}
  .md sub{color:#8b949e;}
  .md em{color:#c9d1d9;}
</style>
</head>
<body>
  <div class="topbar"><span class="dot"></span><b>aiDAPTIV-Phison</b><span class="muted">/ ai-data-platform</span><span class="muted">— README.md 預覽</span></div>
  <div class="wrap">
    <div class="readme-head">
      <svg width="16" height="16" viewBox="0 0 16 16"><path d="M0 1.75A.75.75 0 0 1 .75 1h4.253c1.227 0 2.317.59 3 1.501A3.743 3.743 0 0 1 11.006 1h4.245a.75.75 0 0 1 .75.75v10.5a.75.75 0 0 1-.75.75h-4.507a2.25 2.25 0 0 0-1.591.659l-.622.621a.75.75 0 0 1-1.06 0l-.622-.621A2.25 2.25 0 0 0 5.258 13H.75a.75.75 0 0 1-.75-.75Zm7.251 10.324.004-5.073-.002-2.253A2.25 2.25 0 0 0 5.003 2.5H1.5v9h3.757a3.75 3.75 0 0 1 1.994.574ZM8.755 4.75l-.004 7.322a3.752 3.752 0 0 1 1.992-.572H14.5v-9h-3.495a2.25 2.25 0 0 0-2.25 2.25Z"></path></svg>
      <b>README.md</b>
    </div>
    <div class="md" id="md">載入中…</div>
  </div>
<script>
  fetch('README.md').then(r=>r.text()).then(t=>{
    marked.setOptions({gfm:true,breaks:false});
    document.getElementById('md').innerHTML = marked.parse(t);
  }).catch(e=>{document.getElementById('md').textContent='無法載入 README.md：'+e;});
</script>
</body>
</html>
