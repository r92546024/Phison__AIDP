<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" fill="none" role="img" aria-label="Phison AI Data Platform">
  <defs>
    <linearGradient id="h-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#39E6C8"></stop>
      <stop offset="1" stop-color="#5B8CFF"></stop>
    </linearGradient>
    <radialGradient id="h-glow" cx="0.5" cy="0.45" r="0.65">
      <stop offset="0" stop-color="#39E6C8" stop-opacity="0.20"></stop>
      <stop offset="0.55" stop-color="#5B8CFF" stop-opacity="0.06"></stop>
      <stop offset="1" stop-color="#5B8CFF" stop-opacity="0"></stop>
    </radialGradient>
    <pattern id="h-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#2A2F44" stroke-width="1"></path>
    </pattern>
    <clipPath id="h-type"><rect id="typerect" x="60" y="108" width="790" height="92"></rect></clipPath>
    
  <style>text{font-family:'Helvetica Neue',Helvetica,Arial,'Liberation Sans',-apple-system,'Segoe UI','PingFang TC','Microsoft JhengHei','Noto Sans TC','Source Han Sans TC',sans-serif}.mono{font-family:'SF Mono','JetBrains Mono','Cascadia Code',ui-monospace,'Roboto Mono','DejaVu Sans Mono',monospace}.ttl{font-weight:800;letter-spacing:-1px}#typerect{animation:h-type 2.1s steps(26,end) .35s both}#caret{animation:h-caret 2.1s steps(26,end) .35s both}#caretbar{animation:h-blink .8s steps(1,end) infinite}#subline{opacity:0;animation:h-up .7s cubic-bezier(.2,.7,.2,1) 2.35s both}#tagline{opacity:0;animation:h-up .7s cubic-bezier(.2,.7,.2,1) 2.6s both}.flow{stroke-dasharray:14 10;animation:h-dash 16s linear infinite}#glow{animation:h-glow 6s ease-in-out infinite}.p1{animation:h-f1 5s ease-in-out infinite}.p2{animation:h-f2 7s ease-in-out infinite}@keyframes h-type{from{width:0}to{width:790px}}@keyframes h-caret{from{transform:translateX(0)}to{transform:translateX(786px)}}@keyframes h-blink{0%,49%{opacity:1}50%,100%{opacity:0}}@keyframes h-up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}@keyframes h-dash{to{stroke-dashoffset:-480}}@keyframes h-glow{0%,100%{opacity:.55}50%{opacity:1}}@keyframes h-f1{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}@keyframes h-f2{0%,100%{transform:translateY(0)}50%{transform:translateY(7px)}}</style></defs>

  <rect width="1200" height="360" fill="#1B1D28"></rect>
  <rect width="1200" height="360" fill="url(#h-grid)" opacity="0.5"></rect>
  <rect id="glow" width="1200" height="360" fill="url(#h-glow)"></rect>

  <g opacity="0.9">
    <circle class="p1" cx="1060" cy="90" r="5" fill="#39E6C8"></circle>
    <circle class="p2" cx="1120" cy="160" r="3.5" fill="#5B8CFF"></circle>
    <circle class="p1" cx="980" cy="60" r="3" fill="#5B8CFF"></circle>
    <circle class="p2" cx="150" cy="305" r="4" fill="#39E6C8"></circle>
  </g>
  <path class="flow" d="M60 332 H1140" stroke="url(#h-accent)" stroke-width="2" opacity="0.45"></path>

  <g class="mono" font-size="15" letter-spacing="4" fill="#39E6C8" opacity="0.9">
    <rect x="60" y="60" width="22" height="2" fill="#39E6C8"></rect>
    <text x="92" y="66">ENTERPRISE  AI  INFRASTRUCTURE</text>
  </g>

  <g clip-path="url(#h-type)">
    <text class="ttl" x="60" y="176" font-size="64" fill="url(#h-accent)">Phison AI Data Platform</text>
  </g>
  <g id="caret"><rect id="caretbar" x="64" y="120" width="5" height="62" fill="#39E6C8"></rect></g>

  <text id="subline" class="sub" x="60" y="236" font-size="26" font-weight="600" fill="#EAECF4">將 AI 從原型，帶到生產規模</text>
  <text id="tagline" class="sub" x="60" y="276" font-size="17" fill="#888FA8">基礎設施 · 資源管理 · AI 中介軟體 · 應用服務，整合為單一平台</text>
</svg>