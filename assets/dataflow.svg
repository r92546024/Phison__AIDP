<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" width="1200" height="440" fill="none" role="img" aria-label="Unified GPU Management">
  <defs>
    <linearGradient id="d-accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#39E6C8"></stop><stop offset="1" stop-color="#5B8CFF"></stop></linearGradient>
    <filter id="d-glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="6" result="b"></feGaussianBlur><feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge></filter>
    
  <style>text{font-family:'Helvetica Neue',Helvetica,Arial,'Liberation Sans',-apple-system,'Segoe UI','PingFang TC','Microsoft JhengHei','Noto Sans TC','Source Han Sans TC',sans-serif}.mono{font-family:'SF Mono','JetBrains Mono','Cascadia Code',ui-monospace,'Roboto Mono','DejaVu Sans Mono',monospace}.wire{fill:none;stroke:#2E3A57;stroke-width:2}.pulse{fill:none;stroke:url(#d-accent);stroke-width:3;stroke-linecap:round;stroke-dasharray:26 320}.pulse.a{animation:d-flow 2.2s linear infinite}.pulse.b{animation:d-flow 2.2s linear .5s infinite}.pulse.c{animation:d-flow 2.2s linear 1s infinite}.pulse.out{animation:d-flow 1.6s linear .3s infinite}.node{animation:d-pop .6s ease-out both}#n1{animation-delay:.1s}#n2{animation-delay:.25s}#n3{animation-delay:.4s}#core{transform-box:fill-box;transform-origin:center;animation:d-core 3s ease-in-out infinite}@keyframes d-flow{from{stroke-dashoffset:346}to{stroke-dashoffset:0}}@keyframes d-pop{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}@keyframes d-core{0%,100%{opacity:.92;transform:scale(1)}50%{opacity:1;transform:scale(1.02)}}</style></defs>
  <rect width="1200" height="440" fill="#1B1D28"></rect>
  <text class="f" x="60" y="52" font-size="28" font-weight="800" fill="#EAECF4">GPU 算力統一管理</text>
  <text class="mono" x="60" y="78" font-size="13" letter-spacing="3" fill="#39E6C8">UNIFIED GPU ORCHESTRATION · MIXED BRANDS &amp; GENERATIONS</text>

  
  <path class="wire" d="M300 150 C420 150 430 220 560 220"></path>
  <path class="wire" d="M300 230 H560"></path>
  <path class="wire" d="M300 310 C420 310 430 240 560 240"></path>
  <path class="pulse a" d="M300 150 C420 150 430 220 560 220"></path>
  <path class="pulse b" d="M300 230 H560"></path>
  <path class="pulse c" d="M300 310 C420 310 430 240 560 240"></path>
  
  <path class="wire" d="M740 230 H900"></path>
  <path class="pulse out" d="M740 230 H900"></path>

  
  <g class="f">
    <g id="n1" class="node"><rect x="120" y="122" width="180" height="56" rx="10" fill="#202738" stroke="#39E6C8" stroke-opacity=".6"></rect><text x="210" y="148" font-size="16" font-weight="700" fill="#EAECF4" text-anchor="middle">GPU · A</text><text x="210" y="167" font-size="11" fill="#8A90A6" text-anchor="middle">NVIDIA</text></g>
    <g id="n2" class="node"><rect x="120" y="202" width="180" height="56" rx="10" fill="#202738" stroke="#5B8CFF" stroke-opacity=".6"></rect><text x="210" y="228" font-size="16" font-weight="700" fill="#EAECF4" text-anchor="middle">GPU · B</text><text x="210" y="247" font-size="11" fill="#8A90A6" text-anchor="middle">AMD</text></g>
    <g id="n3" class="node"><rect x="120" y="282" width="180" height="56" rx="10" fill="#202738" stroke="#39E6C8" stroke-opacity=".6"></rect><text x="210" y="308" font-size="16" font-weight="700" fill="#EAECF4" text-anchor="middle">GPU · C</text><text x="210" y="327" font-size="11" fill="#8A90A6" text-anchor="middle">Intel</text></g>
  </g>

  
  <rect id="core" x="560" y="178" width="180" height="104" rx="14" fill="#1E2740" stroke="url(#d-accent)" stroke-width="2" filter="url(#d-glow)"></rect>
  <text class="f" x="650" y="222" font-size="16" font-weight="800" fill="#FFFFFF" text-anchor="middle">GPU</text>
  <text class="f" x="650" y="244" font-size="16" font-weight="800" fill="#FFFFFF" text-anchor="middle">ORCHESTRATOR</text>
  <text class="mono" x="650" y="266" font-size="11" fill="#39E6C8" text-anchor="middle">POOL · SCHEDULE · vGPU</text>

  
  <g class="f"><rect x="900" y="196" width="200" height="68" rx="10" fill="#202738" stroke="#33405C"></rect><text x="1000" y="226" font-size="15" font-weight="700" fill="#EAECF4" text-anchor="middle">統一資源池</text><text x="1000" y="248" font-size="12" fill="#8A90A6" text-anchor="middle">Unified vGPU Pool</text></g>

  <text class="f" x="60" y="410" font-size="14" fill="#9AA1BC">集中管理不同品牌與世代的 GPU／XPU，提升整體資源利用率與可擴充性。</text>
</svg>